<div class="login-container">
  <!-- Background Layer -->
  <div class="fixed inset-0 z-0">
    <div class="absolute inset-0 bg-black/60 z-10"></div>
    <img
      alt="Luxury workshop background"
      class="w-full h-full object-cover grayscale-[20%] brightness-[40%]"
      data-alt="Moody atmospheric shot of a luxury woodworking atelier with warm spotlights hitting a dark oak desk and artisan tools in shadows"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuAohsE4cWylHFBqNwFQV605UPqi8IBrzqD3HbzKLyjG-mHtGtu-TKt2CxI6LMUfFgdft1YEdZalsbDScNpMkRukXbRZym3hNScW44Fz9qV8G2b1JgeOkt_ak9FW31K1IA7wSWSmtJ_0ES7DPnIhYC-1TNpOLYzgAR1db-AZzpIpTmfQPfWwrahB5ysV3S0nOAd6iFTbWLsWtVlFNHdRJlndMSoNgV5J1Wx1blzDRTRtAMN_8hwAIvNdbtXaHITZ13vse0sK3aIZbPs"
    />
  </div>

  <!-- Main Content Shell -->
  <main class="relative z-20 min-h-screen flex items-center justify-center p-6 lg:p-12">
    <!-- Login Card Container -->
    <div class="w-full max-w-[480px]">
      <!-- Brand Logo Area -->
      <div class="flex flex-col items-center mb-10">
        <div
          class="mb-4 flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high/40 backdrop-blur-md"
        >
          <span class="material-symbols-outlined text-primary text-4xl">chair</span>
        </div>
        <h1 class="text-3xl font-black tracking-tighter text-gradient-brass font-['Manrope']">
          كُشك
        </h1>
      </div>

      <!-- Login Card -->
      <div
        class="glass-card border border-outline-variant/10 rounded-xl p-8 lg:p-10 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.5)]"
      >
        <!-- Header -->
        <div class="mb-8 text-center lg:text-right">
          <h2 class="text-2xl font-bold text-on-surface mb-2">نورت كشك يا معلم</h2>
          <p class="text-on-surface-variant/80 font-medium">سجل دخولك عشان نفتح الورشة</p>
        </div>

        <!-- Form -->
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
          <!-- Phone Number Field -->
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-on-surface-variant mr-1">
              اسم المستخدم
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                <span
                  class="material-symbols-outlined text-on-surface-variant/50 group-focus-within:text-primary transition-colors"
                  >smartphone</span
                >
              </div>
              <input
                type="tel"
                id="mobile"
                formControlName="email"
                class="block w-full bg-surface-container-lowest/50 border-outline-variant/20 rounded-xl py-4 pr-12 pl-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all outline-none"
                placeholder="01xxxxxxxxx"
              />
            </div>
          </div>

          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
              <label class="block text-sm font-semibold text-on-surface-variant">كلمة السر</label>
              <a
                class="text-xs font-bold text-primary hover:text-primary-container transition-colors"
                href="#"
                >نسيت المفتاح؟</a
              >
            </div>
            <div class="relative group">
              <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                <span
                  class="material-symbols-outlined text-on-surface-variant/50 group-focus-within:text-primary transition-colors"
                  >lock</span
                >
              </div>
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                formControlName="password"
                class="block w-full bg-surface-container-lowest/50 border-outline-variant/20 rounded-xl py-4 pr-12 pl-12 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all outline-none"
                placeholder="••••••••"
              />
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center">
                <button
                  class="text-on-surface-variant/40 hover:text-on-surface transition-colors"
                  type="button"
                  (click)="togglePasswordVisibility()"
                >
                  <span class="material-symbols-outlined text-xl">visibility</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="pt-4">
            <button
              type="submit"
              class="btn-gradient-brass w-full py-4 rounded-xl text-on-primary font-bold text-lg shadow-[0_10px_20px_-5px_rgba(232,196,106,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2"
              [disabled]="loginForm.invalid || loading()"
            >
              <span>افتح الباب</span>
              <span class="material-symbols-outlined">meeting_room</span>
            </button>
          </div>

          <!-- Error Alert -->
          <div class="error-alert" *ngIf="error()">
            <span class="material-symbols-outlined error-icon">error</span>
            <span class="error-text">{{ error() }}</span>
          </div>
        </form>

        <!-- Footer Links -->
        <div class="mt-8 flex flex-col items-center gap-4">
          <button
            class="flex items-center gap-2 px-6 py-3 rounded-full bg-surface-container-high/40 text-on-surface-variant hover:text-on-surface transition-all text-sm font-medium border border-outline-variant/10"
          >
            <span class="material-symbols-outlined text-lg">help_center</span>
            <span>محتاج مساعدة؟</span>
          </button>
        </div>
      </div>

      <!-- Legal / Version Footer -->
      <div class="mt-8 text-center">
        <p class="text-on-surface-variant/30 text-xs font-['Manrope'] uppercase tracking-[0.2em]">
          © 2024 كُشك Interior Management Systems v2.4
        </p>
      </div>
    </div>
  </main>

  <!-- Visual Accents: Light Leak -->
  <div
    class="fixed top-0 right-0 w-[500px] h-[500px] bg-primary/5 blur-[150px] rounded-full pointer-events-none"
  ></div>
  <div
    class="fixed bottom-0 left-0 w-[400px] h-[400px] bg-secondary/5 blur-[120px] rounded-full pointer-events-none"
  ></div>
</div>
